name: sports_venue_chatbot
description: Sports Venue AI Chatbot for Billiards, Pickleball & Badminton
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: 2.4.9
  riverpod_annotation: 2.3.3

  # Navigation
  go_router: 13.0.0

  # Network
  dio: 5.4.0
  web_socket_channel: 3.0.3

  # Chat UI
  flutter_chat_ui: 1.6.12
  flutter_chat_types: 3.6.2
  flutter_markdown: 0.7.0

  # Date & Formatting
  intl: 0.20.2

  # JSON Serialization
  json_annotation: 4.8.1
  freezed_annotation: 2.4.1

  # Image Caching
  cached_network_image: 3.3.1

  # Storage
  shared_preferences: 2.2.2
  flutter_secure_storage: 9.0.0

  # Utilities
  uuid: 4.2.2
  equatable: 2.0.5

  # WebView (VNPay payment)
  webview_flutter: ^4.7.0

  # Stripe native payment
  flutter_stripe: ^11.0.0

  # Voice / Speech-to-Text
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0

  # UI Components
  flutter_animate: 4.3.0
  shimmer: 3.0.0
  badges: 3.1.2
  flutter_slidable: 3.0.1
  device_info_plus: 12.4.0
  google_fonts: ^8.1.0
  flutter_tts: ^4.2.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  local_auth: ^3.0.1
  audio_session: ^0.2.3

  # WebRTC (voice call between staff & customer)
  flutter_webrtc: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.1
  build_runner: ^2.4.13
  json_serializable: 6.7.1
  freezed: 2.4.5
  riverpod_generator: 2.3.9
  riverpod_lint: 2.3.7

flutter:
  uses-material-design: true
  default-flavor: appDev
