name: sports_venue_chatbot
description: Sports Venue AI Chatbot for Billiards, Pickleball & Badminton
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Network
  dio: ^5.4.0
  web_socket_channel: ^3.0.3

  # Chat UI
  flutter_chat_ui: ^1.6.12
  flutter_chat_types: ^3.6.2
  flutter_markdown: ^0.7.0

  # Date & Formatting
  intl: ^0.20.2

  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Image Caching
  cached_network_image: ^3.3.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utilities
  uuid: ^4.2.2
  equatable: ^2.0.5

  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_slidable: ^3.0.1
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  default-flavor: appDev
