<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Đối tác F&B</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f5f0eb; color: #2c2c2c; min-height: 100vh; padding-bottom: 80px; }

.header { background: linear-gradient(135deg, #c0392b, #e74c3c); padding: 16px; color: #fff; position: sticky; top: 0; z-index: 20; }
.header h1 { font-size: 18px; font-weight: 800; }
.header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.header-badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }

.delivery-bar { background: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e8e0d8; font-size: 13px; }
.delivery-bar .icon { font-size: 18px; }
.delivery-bar strong { font-weight: 700; }

.search-bar { padding: 12px 16px; background: #fff; }
.search-input { width: 100%; padding: 10px 14px 10px 36px; border: 1px solid #e8e0d8; border-radius: 12px; font-size: 14px; background: #f9f5f0; outline: none; }
.search-wrap { position: relative; }
.search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }

.cat-scroll { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; background: #fff; margin-bottom: 8px; }
.cat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 60px; }
.cat-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.cat-label { font-size: 11px; font-weight: 600; color: #555; white-space: nowrap; }
.cat-label.active { color: #c0392b; }

.section { padding: 14px 16px 8px; }
.section-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; }

.rest-list { padding: 0 16px; }
.rest-card { background: #fff; border-radius: 14px; margin-bottom: 12px; overflow: hidden; border: 1px solid #e8e0d8; cursor: pointer; }
.rest-card:active { transform: scale(0.98); }
.rest-banner { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; }
.rest-banner .rest-status { position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; }
.rest-banner .rest-status.open { background: #27ae60; color: #fff; }
.rest-banner .rest-status.closed { background: #e74c3c; color: #fff; }
.rest-body { padding: 12px; }
.rest-name { font-size: 15px; font-weight: 700; }
.rest-desc { font-size: 12px; color: #888; margin-top: 2px; }
.rest-meta { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 12px; }
.rest-rating { color: #f9a825; font-weight: 700; }
.rest-time { color: #888; }

/* Store detail modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 40; display: none; }
.modal-overlay.open { display: block; }
.modal-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px; border-bottom: 8px solid #f5f0eb; }
.modal-header h2 { font-size: 20px; font-weight: 800; }
.modal-header .meta { display: flex; gap: 12px; margin-top: 6px; font-size: 13px; color: #555; }
.modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; border: none; font-size: 18px; cursor: pointer; }
.modal-menu-title { padding: 12px 16px 8px; font-size: 15px; font-weight: 700; color: #888; }

.menu-item { display: flex; padding: 12px 16px; gap: 12px; border-bottom: 1px solid #f0f0f0; }
.menu-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.menu-info { flex: 1; }
.menu-name { font-size: 14px; font-weight: 700; }
.menu-desc { font-size: 12px; color: #888; margin-top: 2px; }
.menu-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.menu-price { font-size: 14px; font-weight: 800; color: #c0392b; }
.menu-add { width: 28px; height: 28px; border-radius: 8px; background: #c0392b; color: #fff; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Cart bar */
.cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e8e0d8; padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 30; transform: translateY(100%); transition: transform 0.3s; }
.cart-bar.show { transform: translateY(0); }
.cart-icon-wrap { position: relative; font-size: 24px; }
.cart-count { position: absolute; top: -6px; right: -8px; background: #c0392b; color: #fff; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cart-info { flex: 1; }
.cart-info-label { font-size: 11px; color: #888; }
.cart-info-price { font-size: 18px; font-weight: 800; color: #c0392b; }
.cart-btn { background: #c0392b; color: #fff; border: none; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* Cart drawer */
.cart-drawer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 50; display: none; }
.cart-drawer.open { display: block; }
.cart-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; max-height: 70vh; overflow-y: auto; padding: 20px; }
.cart-sheet h3 { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
.cart-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; }
.cart-item-store { font-size: 11px; color: #888; }
.cart-item-price { font-size: 13px; color: #c0392b; font-weight: 700; }
.qty-control { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid #e8e0d8; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-val { font-weight: 700; min-width: 20px; text-align: center; }
.cart-summary { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e8e0d8; }
.cart-summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: #555; }
.cart-summary-row.total { font-size: 16px; font-weight: 800; color: #2c2c2c; }
.cart-summary-row.total .val { color: #c0392b; }
.checkout-btn { width: 100%; padding: 14px; background: #c0392b; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #2c2c2c; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 600; z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

.order-success { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 70; display: none; align-items: center; justify-content: center; }
.order-success.open { display: flex; }
.order-card { background: #fff; border-radius: 20px; padding: 32px; text-align: center; max-width: 300px; width: 90%; }
.order-card .icon { font-size: 56px; margin-bottom: 12px; }
.order-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.order-card p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.4; }
.order-card .order-id { font-size: 12px; color: #aaa; margin-bottom: 16px; }
.order-card button { width: 100%; padding: 14px; background: #27ae60; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

.loading { text-align: center; padding: 40px; color: #888; }
.error { text-align: center; padding: 40px; color: #e74c3c; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>🍔 Đặt đồ từ đối tác</h1>
      <p>Giao tận sân, đối tác uy tín</p>
    </div>
    <div class="header-badge">🎫 FREESHIP</div>
  </div>
</div>

<div class="delivery-bar">
  <span class="icon">📍</span>
  <span>Giao đến: <strong>Sân đang đặt</strong></span>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Tìm quán ăn, món ngon..." oninput="searchStores(this.value)">
  </div>
</div>

<div class="cat-scroll">
  <div class="cat-item" onclick="filterCat('all', this)"><div class="cat-icon" style="background:#fff3e0">🔥</div><div class="cat-label active">Tất cả</div></div>
  <div class="cat-item" onclick="filterCat('food', this)"><div class="cat-icon" style="background:#fce4ec">🍗</div><div class="cat-label">Đồ ăn</div></div>
  <div class="cat-item" onclick="filterCat('drink', this)"><div class="cat-icon" style="background:#e3f2fd">🧋</div><div class="cat-label">Đồ uống</div></div>
  <div class="cat-item" onclick="filterCat('dessert', this)"><div class="cat-icon" style="background:#f3e5f5">🍦</div><div class="cat-label">Tráng miệng</div></div>
</div>

<div class="section">
  <div class="section-title">Quán gần sân</div>
</div>
<div class="rest-list" id="rest-list">
  <div class="loading">Đang tải danh sách đối tác...</div>
</div>

<div class="cart-bar" id="cart-bar">
  <div class="cart-icon-wrap">🛒<span class="cart-count" id="cart-count">0</span></div>
  <div class="cart-info">
    <div class="cart-info-label">Tổng cộng</div>
    <div class="cart-info-price" id="cart-total">0đ</div>
  </div>
  <button class="cart-btn" onclick="openCart()">Xem giỏ</button>
</div>

<div class="cart-drawer" id="cart-drawer" onclick="closeCart()">
  <div class="cart-sheet" onclick="event.stopPropagation()">
    <h3>🛒 Giỏ hàng</h3>
    <div id="cart-items"></div>
    <div class="cart-summary" id="cart-summary"></div>
    <button class="checkout-btn" onclick="placeOrder()">Đặt hàng • <span id="checkout-total">0đ</span></button>
  </div>
</div>

<div class="modal-overlay" id="store-modal" onclick="closeStoreModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div style="position:relative">
      <div class="modal-header">
        <h2 id="modal-name"></h2>
        <div class="meta">
          <span id="modal-rating"></span>
          <span id="modal-time"></span>
          <span id="modal-fee"></span>
        </div>
      </div>
      <button class="modal-close" onclick="closeStoreModal()">✕</button>
    </div>
    <div class="modal-menu-title">📋 Thực đơn</div>
    <div id="modal-menu"></div>
    <div style="height:20px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="order-success" id="order-success">
  <div class="order-card">
    <div class="icon">✅</div>
    <h3>Đặt hàng thành công!</h3>
    <p id="order-detail"></p>
    <div class="order-id" id="order-id"></div>
    <button onclick="closeOrderSuccess()">Đã hiểu</button>
  </div>
</div>

<script>
let stores = [];
let storeMenus = {};
let cart = {};
let currentCat = 'all';
let currentSearch = '';

function formatPrice(p) { return Number(p).toLocaleString('vi-VN') + 'đ'; }

function getCatIcon(cat) {
  const map = {food:'🍗', drink:'🧋', dessert:'🍦', combo:'🎁'};
  return map[cat] || '🍽️';
}

function getCatBg(cat) {
  const map = {food:'#fff3e0', drink:'#e3f2fd', dessert:'#f3e5f5', combo:'#e8f5e9'};
  return map[cat] || '#f5f5f5';
}

function renderStores() {
  const list = document.getElementById('rest-list');
  let filtered = stores.filter(s => s.status === 'active' && !s.is_deleted);
  if (currentCat !== 'all') filtered = filtered.filter(s => s.category === currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.description || '').toLowerCase().includes(q)
    );
  }

  if (filtered.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:#888;padding:40px 0;">Không tìm thấy quán nào</p>';
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="rest-card" onclick="openStore('${s.id}')">
      <div class="rest-banner" style="background:${getCatBg(s.category)}">
        ${getCatIcon(s.category)}
        <div class="rest-status ${s.is_open ? 'open' : 'closed'}">${s.is_open ? 'Đang mở' : 'Đã đóng'}</div>
      </div>
      <div class="rest-body">
        <div class="rest-name">${s.name}</div>
        <div class="rest-desc">${s.description || ''}</div>
        <div class="rest-meta">
          <span class="rest-rating">⭐ ${Number(s.rating).toFixed(1)}</span>
          <span class="rest-time">🕐 ${s.estimated_delivery_minutes} phút</span>
          <span class="rest-time">🚀 ${formatPrice(s.delivery_fee)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-label').forEach(c => c.classList.remove('active'));
  el.querySelector('.cat-label').classList.add('active');
  renderStores();
}

function searchStores(q) {
  currentSearch = q;
  renderStores();
}

async function openStore(storeId) {
  const store = stores.find(s => s.id === storeId);
  if (!store) return;

  document.getElementById('modal-name').textContent = store.name;
  document.getElementById('modal-rating').textContent = '⭐ ' + Number(store.rating).toFixed(1) + ' (' + store.total_orders + ' đơn)';
  document.getElementById('modal-time').textContent = '🕐 ' + store.estimated_delivery_minutes + ' phút';
  document.getElementById('modal-fee').textContent = '🚀 ' + formatPrice(store.delivery_fee);

  const menu = storeMenus[storeId] || [];
  if (menu.length === 0) {
    document.getElementById('modal-menu').innerHTML = '<div class="loading">Đang tải thực đơn...</div>';
    document.getElementById('store-modal').classList.add('open');
    // Request menu from Flutter
    if (window.PartnerBridge) {
      window.PartnerBridge.postMessage(JSON.stringify({action: 'fetchMenu', storeId: storeId}));
    }
    return;
  }

  renderMenu(storeId, menu);
  document.getElementById('store-modal').classList.add('open');
}

function renderMenu(storeId, menu) {
  document.getElementById('modal-menu').innerHTML = menu.filter(m => m.is_available).map(m => `
    <div class="menu-item">
      <div class="menu-icon" style="background:${getCatBg(m.category)}">${getCatIcon(m.category)}</div>
      <div class="menu-info">
        <div class="menu-name">${m.name}</div>
        <div class="menu-desc">${m.description || ''}</div>
        <div class="menu-bottom">
          <div class="menu-price">${formatPrice(m.price)}</div>
          <button class="menu-add" onclick="event.stopPropagation(); addToCart('${storeId}','${m.id}','${m.name}',${m.price})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function closeStoreModal() { document.getElementById('store-modal').classList.remove('open'); }

function addToCart(storeId, itemId, itemName, price) {
  const key = storeId + ':' + itemId;
  if (!cart[key]) {
    cart[key] = {storeId, itemId, name: itemName, price: Number(price), qty: 0};
  }
  cart[key].qty++;
  showToast('Đã thêm ' + itemName);
  updateCartBar();
}

function updateCartBar() {
  const totalItems = Object.values(cart).reduce((a, b) => a + b.qty, 0);
  const totalPrice = calcTotal();
  document.getElementById('cart-bar').classList.toggle('show', totalItems > 0);
  document.getElementById('cart-count').textContent = totalItems;
  document.getElementById('cart-total').textContent = formatPrice(totalPrice);
}

function calcTotal() {
  return Object.values(cart).reduce((s, c) => s + c.price * c.qty, 0);
}

function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  renderCartItems();
}

function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); }

function renderCartItems() {
  const container = document.getElementById('cart-items');
  const entries = Object.entries(cart).filter(([, c]) => c.qty > 0);
  if (entries.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">Giỏ hàng trống</p>';
    document.getElementById('cart-summary').innerHTML = '';
    return;
  }

  container.innerHTML = entries.map(([key, c]) => {
    const store = stores.find(s => s.id === c.storeId);
    return `
      <div class="cart-item">
        <div class="menu-icon" style="background:#f5f0eb;font-size:20px">${getCatIcon(store ? store.category : 'food')}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-store">${store ? store.name : ''}</div>
          <div class="cart-item-price">${formatPrice(c.price)}</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${key}', -1)">−</button>
          <span class="qty-val">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${key}', 1)">+</button>
        </div>
      </div>`;
  }).join('');

  const total = calcTotal();
  const fee = 15000;
  document.getElementById('cart-summary').innerHTML = `
    <div class="cart-summary-row"><span>Tạm tính</span><span>${formatPrice(total)}</span></div>
    <div class="cart-summary-row"><span>Phí giao hàng</span><span>${formatPrice(fee)}</span></div>
    <div class="cart-summary-row total"><span>Tổng cộng</span><span class="val">${formatPrice(total + fee)}</span></div>
  `;
  document.getElementById('checkout-total').textContent = formatPrice(total + fee);
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  updateCartBar();
  renderCartItems();
}

function placeOrder() {
  const entries = Object.entries(cart).filter(([, c]) => c.qty > 0);
  if (entries.length === 0) return;

  // Group items by store
  const ordersByStore = {};
  for (const [key, c] of entries) {
    if (!ordersByStore[c.storeId]) ordersByStore[c.storeId] = [];
    ordersByStore[c.storeId].push({
      item_id: c.itemId,
      item_name: c.name,
      quantity: c.qty,
      unit_price: c.price
    });
  }

  // Send to Flutter for API call
  if (window.PartnerBridge) {
    window.PartnerBridge.postMessage(JSON.stringify({
      action: 'placeOrder',
      orders: ordersByStore
    }));
  }
}

function onOrderSuccess(orderId) {
  document.getElementById('order-id').textContent = 'Mã đơn: ' + orderId;
  document.getElementById('order-detail').innerHTML = 'Đơn hàng đã được gửi đến đối tác.<br>Bạn sẽ nhận thông báo khi đơn được xác nhận.';
  document.getElementById('order-success').classList.add('open');
  cart = {};
  updateCartBar();
  closeCart();
}

function closeOrderSuccess() { document.getElementById('order-success').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Called from Flutter with stores data
function loadStores(data) {
  stores = data;
  renderStores();
}

// Called from Flutter with menu data for a store
function loadMenu(storeId, menuData) {
  storeMenus[storeId] = menuData;
  renderMenu(storeId, menuData);
}

// Called from Flutter on order error
function onOrderError(msg) {
  showToast('Lỗi: ' + msg);
}
</script>
</body>
</html>
